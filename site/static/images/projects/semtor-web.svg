<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#g)"/>
  <!-- Browser window frame -->
  <rect x="40" y="50" width="320" height="300" rx="6" fill="none" stroke="#a3e635" stroke-width="1.5" opacity="0.4"/>
  <!-- Title bar -->
  <line x1="40" y1="75" x2="360" y2="75" stroke="#a3e635" stroke-width="1" opacity="0.3"/>
  <circle cx="58" cy="63" r="4" fill="#f97316" opacity="0.4"/>
  <circle cx="73" cy="63" r="4" fill="#a3e635" opacity="0.4"/>
  <circle cx="88" cy="63" r="4" fill="#a3e635" opacity="0.2"/>
  <!-- Epithelial sheet (top row of cells) -->
  <g fill="#a3e635" opacity="0.4" stroke="#a3e635" stroke-width="0.8">
    <rect x="70" y="110" width="30" height="40" rx="3"/>
    <rect x="105" y="110" width="30" height="40" rx="3"/>
    <rect x="140" y="110" width="30" height="40" rx="3"/>
    <rect x="210" y="110" width="30" height="40" rx="3"/>
    <rect x="245" y="110" width="30" height="40" rx="3"/>
    <rect x="280" y="110" width="30" height="40" rx="3"/>
  </g>
  <!-- Transitioning cell (EMT) -->
  <g opacity="0.6">
    <rect x="175" y="110" width="30" height="40" rx="3" fill="#f97316" fill-opacity="0.3" stroke="#f97316" stroke-width="1"/>
    <!-- Delaminating cell below -->
    <circle cx="190" cy="180" r="10" fill="#f97316" opacity="0.5"/>
    <!-- Arrow down -->
    <line x1="190" y1="155" x2="190" y2="168" stroke="#f97316" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Migrating mesenchymal cells below -->
  <g fill="#f97316" opacity="0.4">
    <circle cx="120" cy="220" r="7"/>
    <circle cx="160" cy="240" r="6"/>
    <circle cx="230" cy="225" r="7.5"/>
    <circle cx="270" cy="250" r="6"/>
  </g>
  <!-- Basement membrane line -->
  <line x1="60" y1="160" x2="340" y2="160" stroke="#a3e635" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>
  <!-- Play button -->
  <polygon points="185,295 185,315 205,305" fill="#a3e635" opacity="0.4"/>
</svg>
