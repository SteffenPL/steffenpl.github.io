<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#g)"/>
  <!-- Constraint set (moving convex set) -->
  <ellipse cx="220" cy="200" rx="100" ry="120" fill="#a3e635" fill-opacity="0.05" stroke="#a3e635" stroke-width="1.5" opacity="0.35"/>
  <!-- Ghost of previous constraint position (delay) -->
  <ellipse cx="190" cy="210" rx="100" ry="120" fill="none" stroke="#a3e635" stroke-width="1" stroke-dasharray="5 4" opacity="0.15"/>
  <!-- Trajectory of swept point -->
  <path d="M80 300 Q100 280 120 250 Q150 200 180 180 Q210 160 240 170 Q260 180 270 200" fill="none" stroke="#f97316" stroke-width="2" opacity="0.5"/>
  <!-- Current point on boundary -->
  <circle cx="270" cy="200" r="6" fill="#f97316" opacity="0.7"/>
  <!-- Normal cone arrow (pushing point back into set) -->
  <g stroke="#f97316" stroke-width="1.5" opacity="0.4">
    <line x1="290" y1="195" x2="260" y2="202"/>
    <polyline points="264,198 260,202 265,205" fill="none"/>
  </g>
  <!-- Memory/delay indicator: dashed trail -->
  <g fill="#f97316" opacity="0.25">
    <circle cx="240" cy="170" r="3"/>
    <circle cx="210" cy="160" r="2.5"/>
    <circle cx="180" cy="180" r="2"/>
    <circle cx="150" cy="200" r="1.8"/>
  </g>
  <!-- Time arrow -->
  <g stroke="#a3e635" stroke-width="1" opacity="0.3">
    <line x1="160" y1="340" x2="300" y2="340"/>
    <polyline points="295,336 300,340 295,344" fill="none"/>
  </g>
  <text x="220" y="360" font-family="monospace" font-size="10" fill="#a3e635" opacity="0.35" text-anchor="middle">t</text>
  <!-- C(t) label -->
  <text x="220" y="105" font-family="monospace" font-size="11" fill="#a3e635" opacity="0.4" text-anchor="middle">C(t)</text>
</svg>
