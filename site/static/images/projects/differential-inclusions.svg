<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#g)"/>
  <!-- Axes -->
  <line x1="60" y1="320" x2="350" y2="320" stroke="#a3e635" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="320" x2="60" y2="60" stroke="#a3e635" stroke-width="1" opacity="0.3"/>
  <!-- t label -->
  <text x="355" y="325" font-family="monospace" font-size="11" fill="#a3e635" opacity="0.4">t</text>
  <!-- x label -->
  <text x="50" y="55" font-family="monospace" font-size="11" fill="#a3e635" opacity="0.4">x</text>
  <!-- Solution funnel / reachable set (shaded region) -->
  <path d="M80 250 Q120 220 160 200 Q200 170 240 150 Q280 120 320 100" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <path d="M80 250 Q120 260 160 260 Q200 270 240 275 Q280 280 320 280" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <!-- Fill between curves -->
  <path d="M80 250 Q120 220 160 200 Q200 170 240 150 Q280 120 320 100 L320 280 Q280 280 240 275 Q200 270 160 260 Q120 260 80 250 Z" fill="#f97316" opacity="0.06"/>
  <!-- Multiple solution trajectories inside the funnel -->
  <g stroke="#a3e635" stroke-width="1.2" opacity="0.4" fill="none">
    <path d="M80 250 Q120 235 160 225 Q200 210 240 200 Q280 185 320 170"/>
    <path d="M80 250 Q120 245 160 240 Q200 235 240 235 Q280 230 320 220"/>
    <path d="M80 250 Q120 250 160 245 Q200 250 240 255 Q280 260 320 260"/>
    <path d="M80 250 Q120 240 160 215 Q200 195 240 175 Q280 155 320 135"/>
  </g>
  <!-- Starting point -->
  <circle cx="80" cy="250" r="5" fill="#f97316" opacity="0.7"/>
  <!-- x'(t) ∈ F(x) notation -->
  <text x="140" y="100" font-family="monospace" font-size="12" fill="#f97316" opacity="0.5">x' ∈ F(x)</text>
</svg>
