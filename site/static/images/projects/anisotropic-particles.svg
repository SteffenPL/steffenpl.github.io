<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#g)"/>
  <!-- Anisotropic ellipsoidal particles with nematic alignment -->
  <g fill="none" stroke-width="1.5" opacity="0.5">
    <!-- Aligned cluster -->
    <ellipse cx="100" cy="120" rx="22" ry="7" transform="rotate(-20 100 120)" stroke="#f97316"/>
    <ellipse cx="150" cy="105" rx="20" ry="6" transform="rotate(-15 150 105)" stroke="#f97316"/>
    <ellipse cx="130" cy="145" rx="21" ry="7" transform="rotate(-18 130 145)" stroke="#f97316"/>
    <ellipse cx="180" cy="130" rx="19" ry="6" transform="rotate(-22 180 130)" stroke="#f97316"/>
    <ellipse cx="90" cy="160" rx="20" ry="7" transform="rotate(-16 90 160)" stroke="#f97316"/>
    <ellipse cx="160" cy="160" rx="21" ry="6" transform="rotate(-20 160 160)" stroke="#f97316"/>

    <!-- Transition zone -->
    <ellipse cx="230" cy="180" rx="20" ry="7" transform="rotate(5 230 180)" stroke="#a3e635"/>
    <ellipse cx="200" cy="200" rx="21" ry="6" transform="rotate(-5 200 200)" stroke="#a3e635"/>
    <ellipse cx="260" cy="200" rx="19" ry="7" transform="rotate(10 260 200)" stroke="#a3e635"/>

    <!-- Differently aligned cluster -->
    <ellipse cx="250" cy="260" rx="22" ry="7" transform="rotate(50 250 260)" stroke="#a3e635"/>
    <ellipse cx="290" cy="240" rx="20" ry="6" transform="rotate(55 290 240)" stroke="#a3e635"/>
    <ellipse cx="280" cy="280" rx="21" ry="7" transform="rotate(48 280 280)" stroke="#a3e635"/>
    <ellipse cx="320" cy="260" rx="19" ry="6" transform="rotate(52 320 260)" stroke="#a3e635"/>
    <ellipse cx="310" cy="300" rx="20" ry="7" transform="rotate(50 310 300)" stroke="#a3e635"/>
    <ellipse cx="260" cy="310" rx="21" ry="6" transform="rotate(45 260 310)" stroke="#a3e635"/>
  </g>
  <!-- Direction arrows -->
  <g stroke="#f97316" stroke-width="1.2" opacity="0.3" fill="none">
    <line x1="60" y1="90" x2="210" y2="75"/>
    <polygon points="210,75 203,71 204,79" fill="#f97316" stroke="none" opacity="0.3"/>
  </g>
  <g stroke="#a3e635" stroke-width="1.2" opacity="0.3" fill="none">
    <line x1="340" y1="340" x2="340" y2="210"/>
    <polygon points="340,210 336,218 344,218" fill="#a3e635" stroke="none" opacity="0.3"/>
  </g>
</svg>
