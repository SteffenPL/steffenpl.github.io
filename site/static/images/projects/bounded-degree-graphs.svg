<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#g)"/>
  <!-- Graph edges -->
  <g stroke="#a3e635" stroke-width="1.5" opacity="0.35">
    <!-- Edges from node A (120,120) -->
    <line x1="120" y1="120" x2="200" y2="80"/>
    <line x1="120" y1="120" x2="80" y2="200"/>
    <line x1="120" y1="120" x2="200" y2="180"/>
    <!-- Edges from node B (200,80) -->
    <line x1="200" y1="80" x2="300" y2="100"/>
    <line x1="200" y1="80" x2="200" y2="180"/>
    <!-- Edges from node C (300,100) -->
    <line x1="300" y1="100" x2="320" y2="200"/>
    <line x1="300" y1="100" x2="200" y2="180"/>
    <!-- Edges from node D (80,200) -->
    <line x1="80" y1="200" x2="140" y2="280"/>
    <line x1="80" y1="200" x2="200" y2="180"/>
    <!-- Edges from node E (200,180) -->
    <line x1="200" y1="180" x2="320" y2="200"/>
    <!-- Edges from node F (320,200) -->
    <line x1="320" y1="200" x2="300" y2="300"/>
    <!-- Edges from node G (140,280) -->
    <line x1="140" y1="280" x2="220" y2="310"/>
    <line x1="140" y1="280" x2="200" y2="180"/>
    <!-- Edges from node H (220,310) -->
    <line x1="220" y1="310" x2="300" y2="300"/>
    <!-- Edges from node I (300,300) -->
  </g>
  <!-- Graph nodes -->
  <g opacity="0.7">
    <circle cx="120" cy="120" r="10" fill="#f97316"/>
    <circle cx="200" cy="80" r="10" fill="#f97316"/>
    <circle cx="300" cy="100" r="10" fill="#a3e635"/>
    <circle cx="80" cy="200" r="10" fill="#a3e635"/>
    <circle cx="200" cy="180" r="10" fill="#f97316"/>
    <circle cx="320" cy="200" r="10" fill="#a3e635"/>
    <circle cx="140" cy="280" r="10" fill="#f97316"/>
    <circle cx="220" cy="310" r="10" fill="#a3e635"/>
    <circle cx="300" cy="300" r="10" fill="#f97316"/>
  </g>
  <!-- Degree labels (small) -->
  <g font-family="monospace" font-size="9" fill="white" text-anchor="middle" dominant-baseline="central" opacity="0.9">
    <text x="120" y="120">3</text>
    <text x="200" y="80">3</text>
    <text x="300" y="100">3</text>
    <text x="80" y="200">3</text>
    <text x="200" y="180">5</text>
    <text x="320" y="200">3</text>
    <text x="140" y="280">3</text>
    <text x="220" y="310">2</text>
    <text x="300" y="300">3</text>
  </g>
</svg>
