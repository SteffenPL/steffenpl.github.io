<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#g)"/>
  <!-- Tertiary lymphoid structure: cluster of cells forming an aggregate -->
  <!-- Outer boundary -->
  <ellipse cx="200" cy="200" rx="120" ry="110" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.3" stroke-dasharray="6 4"/>
  <!-- B cell zone (follicle) -->
  <circle cx="180" cy="180" r="55" fill="#a3e635" fill-opacity="0.08" stroke="#a3e635" stroke-width="1.2" opacity="0.5"/>
  <!-- T cell zone -->
  <ellipse cx="240" cy="220" rx="45" ry="40" fill="#f97316" fill-opacity="0.08" stroke="#f97316" stroke-width="1.2" opacity="0.5"/>
  <!-- Scattered cells in B zone -->
  <g fill="#a3e635" opacity="0.5">
    <circle cx="160" cy="165" r="5"/><circle cx="185" cy="155" r="4.5"/>
    <circle cx="170" cy="190" r="5.5"/><circle cx="195" cy="175" r="4"/>
    <circle cx="155" cy="185" r="4"/><circle cx="180" cy="200" r="5"/>
    <circle cx="200" cy="190" r="3.5"/><circle cx="165" cy="210" r="4"/>
  </g>
  <!-- Scattered cells in T zone -->
  <g fill="#f97316" opacity="0.5">
    <circle cx="230" cy="210" r="4.5"/><circle cx="250" cy="220" r="5"/>
    <circle cx="240" cy="235" r="4"/><circle cx="260" cy="205" r="3.5"/>
    <circle cx="225" cy="230" r="5"/><circle cx="250" cy="240" r="4"/>
  </g>
  <!-- HEV vessel -->
  <path d="M120 280 Q160 260 200 270 Q240 280 280 260" fill="none" stroke="#f97316" stroke-width="2" opacity="0.4"/>
  <!-- Labels -->
  <text x="165" y="145" font-family="monospace" font-size="10" fill="#a3e635" opacity="0.6">B</text>
  <text x="248" y="200" font-family="monospace" font-size="10" fill="#f97316" opacity="0.6">T</text>
</svg>
