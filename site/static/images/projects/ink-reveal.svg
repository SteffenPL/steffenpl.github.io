<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#g)"/>
  <!-- Inkscape canvas (left) -->
  <rect x="30" y="100" width="140" height="105" rx="4" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.4"/>
  <!-- Vector shapes on canvas -->
  <circle cx="70" cy="135" r="15" fill="none" stroke="#f97316" stroke-width="1.2" opacity="0.5"/>
  <rect x="100" y="125" width="40" height="25" rx="2" fill="none" stroke="#f97316" stroke-width="1.2" opacity="0.5"/>
  <line x1="50" y1="175" x2="150" y2="175" stroke="#f97316" stroke-width="1" opacity="0.3"/>
  <rect x="50" y="180" width="80" height="6" rx="2" fill="#f97316" opacity="0.15"/>
  <!-- Arrow -->
  <g stroke="#a3e635" stroke-width="2" opacity="0.5">
    <line x1="185" y1="150" x2="225" y2="150"/>
    <polyline points="220,145 225,150 220,155" fill="none"/>
  </g>
  <!-- Slide stack (right) - reveal.js slides -->
  <g opacity="0.3">
    <rect x="244" y="108" width="130" height="90" rx="3" fill="none" stroke="#a3e635" stroke-width="1"/>
  </g>
  <g opacity="0.4">
    <rect x="240" y="104" width="130" height="90" rx="3" fill="none" stroke="#a3e635" stroke-width="1"/>
  </g>
  <rect x="236" y="100" width="130" height="90" rx="3" fill="none" stroke="#a3e635" stroke-width="1.5" opacity="0.5"/>
  <!-- Content on front slide -->
  <rect x="252" y="115" width="50" height="5" rx="1" fill="#a3e635" opacity="0.3"/>
  <rect x="252" y="128" width="90" height="3" rx="1" fill="#a3e635" opacity="0.15"/>
  <rect x="252" y="136" width="80" height="3" rx="1" fill="#a3e635" opacity="0.15"/>
  <rect x="252" y="144" width="85" height="3" rx="1" fill="#a3e635" opacity="0.15"/>
  <circle cx="285" cy="170" r="10" fill="none" stroke="#a3e635" stroke-width="1" opacity="0.3"/>
  <!-- Navigation dots -->
  <g fill="#a3e635" opacity="0.4">
    <circle cx="285" cy="200" r="3"/>
    <circle cx="298" cy="200" r="3" opacity="0.2"/>
    <circle cx="311" cy="200" r="3" opacity="0.2"/>
  </g>
  <!-- Labels -->
  <text x="70" y="85" font-family="monospace" font-size="10" fill="#f97316" opacity="0.5" text-anchor="middle">Inkscape</text>
  <text x="301" y="85" font-family="monospace" font-size="10" fill="#a3e635" opacity="0.5" text-anchor="middle">reveal.js</text>
</svg>
