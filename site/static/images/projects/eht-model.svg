<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#g)"/>
  <!-- Aorta floor (endothelial layer) -->
  <path d="M40 220 Q100 215 160 220 Q220 225 280 218 Q340 212 380 220" fill="none" stroke="#a3e635" stroke-width="2" opacity="0.5"/>
  <path d="M40 230 Q100 225 160 230 Q220 235 280 228 Q340 222 380 230" fill="none" stroke="#a3e635" stroke-width="1.5" opacity="0.3"/>
  <!-- Endothelial cells on the floor -->
  <g fill="#a3e635" opacity="0.4">
    <ellipse cx="80" cy="224" rx="12" ry="5"/>
    <ellipse cx="130" cy="222" rx="11" ry="5"/>
    <ellipse cx="240" cy="221" rx="12" ry="5"/>
    <ellipse cx="310" cy="218" rx="11" ry="5"/>
    <ellipse cx="350" cy="222" rx="10" ry="5"/>
  </g>
  <!-- Budding cell (EHT in progress) -->
  <g opacity="0.6">
    <ellipse cx="185" cy="218" rx="12" ry="6" fill="#a3e635"/>
    <circle cx="185" cy="198" r="10" fill="none" stroke="#f97316" stroke-width="1.5"/>
    <line x1="185" y1="212" x2="185" y2="208" stroke="#f97316" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Released hematopoietic cells (round, floating above) -->
  <g fill="#f97316" opacity="0.5">
    <circle cx="150" cy="160" r="8"/>
    <circle cx="220" cy="140" r="7"/>
    <circle cx="260" cy="165" r="9"/>
    <circle cx="180" cy="120" r="6"/>
    <circle cx="290" cy="130" r="7.5"/>
  </g>
  <!-- Upward arrows showing transition direction -->
  <g stroke="#f97316" stroke-width="1" opacity="0.3" fill="none">
    <path d="M150 180 L150 170 M146 174 L150 170 L154 174"/>
    <path d="M220 175 L220 155 M216 159 L220 155 L224 159"/>
    <path d="M260 185 L260 175 M256 179 L260 175 L264 179"/>
  </g>
  <!-- Flow lines suggesting blood flow -->
  <g stroke="#f97316" stroke-width="0.8" opacity="0.15" fill="none">
    <path d="M40 100 Q120 95 200 100 Q280 105 360 98"/>
    <path d="M40 80 Q120 78 200 82 Q280 85 360 80"/>
  </g>
</svg>
