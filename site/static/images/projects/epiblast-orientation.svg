<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#g)"/>
  <!-- Nematic orientation lines radiating from a +1/2 topological defect -->
  <g stroke="#f97316" stroke-width="1.5" opacity="0.5" fill="none">
    <!-- Radial lines suggesting nematic field around defect center -->
    <line x1="200" y1="120" x2="200" y2="80"/>
    <line x1="230" y1="125" x2="250" y2="90"/>
    <line x1="255" y1="140" x2="285" y2="115"/>
    <line x1="270" y1="165" x2="305" y2="150"/>
    <line x1="275" y1="195" x2="310" y2="195"/>
    <line x1="270" y1="225" x2="305" y2="240"/>
    <line x1="255" y1="250" x2="285" y2="275"/>
    <line x1="230" y1="265" x2="250" y2="300"/>
    <line x1="200" y1="270" x2="200" y2="310"/>
    <line x1="170" y1="265" x2="150" y2="300"/>
    <line x1="145" y1="250" x2="115" y2="275"/>
    <line x1="130" y1="225" x2="95" y2="240"/>
    <line x1="125" y1="195" x2="90" y2="195"/>
    <line x1="130" y1="165" x2="95" y2="150"/>
    <line x1="145" y1="140" x2="115" y2="115"/>
    <line x1="170" y1="125" x2="150" y2="90"/>
  </g>
  <!-- +1/2 defect marker -->
  <circle cx="200" cy="195" r="6" fill="#f97316" opacity="0.7"/>
  <!-- -1/2 defect marker -->
  <g transform="translate(300,300)">
    <polygon points="0,-6 5.2,3 -5.2,3" fill="#a3e635" opacity="0.7"/>
  </g>
  <!-- Curved alignment lines suggesting nematic texture -->
  <g stroke="#a3e635" stroke-width="1.2" opacity="0.35" fill="none">
    <path d="M80 60 Q140 80 160 120"/>
    <path d="M60 100 Q120 110 150 160"/>
    <path d="M320 60 Q280 100 260 130"/>
    <path d="M340 120 Q300 140 270 170"/>
    <path d="M80 320 Q140 300 180 280"/>
    <path d="M100 350 Q160 330 200 310"/>
    <path d="M300 340 Q280 310 250 280"/>
    <path d="M330 310 Q300 290 270 260"/>
  </g>
</svg>
